<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="#0f0c29"/>
  <!-- DNA helix -->
  <!-- Left strand -->
  <path d="M30,15 Q50,25 30,35 Q10,45 30,55 Q50,65 30,75 Q10,85 30,95" fill="none" stroke="url(#g1)" stroke-width="6" stroke-linecap="round"/>
  <!-- Right strand -->
  <path d="M70,15 Q50,25 70,35 Q90,45 70,55 Q50,65 70,75 Q90,85 70,95" fill="none" stroke="url(#g3)" stroke-width="6" stroke-linecap="round"/>
  <!-- Rungs -->
  <line x1="32" y1="25" x2="68" y2="25" stroke="url(#g2)" stroke-width="4" stroke-linecap="round"/>
  <line x1="28" y1="45" x2="72" y2="45" stroke="url(#g2)" stroke-width="4" stroke-linecap="round"/>
  <line x1="32" y1="65" x2="68" y2="65" stroke="url(#g2)" stroke-width="4" stroke-linecap="round"/>
  <line x1="28" y1="85" x2="72" y2="85" stroke="url(#g2)" stroke-width="4" stroke-linecap="round"/>
  <!-- Small nodes -->
  <circle cx="30" cy="15" r="4" fill="#a78bfa"/>
  <circle cx="70" cy="15" r="4" fill="#ef4444"/>
  <circle cx="70" cy="95" r="4" fill="#a78bfa"/>
  <circle cx="30" cy="95" r="4" fill="#ef4444"/>
</svg>
